<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPALexicon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"
  />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./app-icon.jpg" />
  <meta name="theme-color" content="#0f1c2e" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <button id="install-btn" class="install-btn" hidden>Install App</button>
  <div id="install-hint" class="install-hint" hidden>
    <p id="install-hint-text">To install this app on desktop: open your browser menu and choose "Install CPALexicon" (Chrome/Edge) or use the "Install app" option near the address bar.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:.5rem">
      <button onclick="closeInstallHint()" class="btn-add">Close</button>
    </div>
  </div>

  <div class="banner">
    <img src="./TSU_JPIA_ACADS.png" alt="CPALexicon Banner" />
  </div>

  <div class="mob-bar">
    <div class="mob-sw">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="mob-search" placeholder="Search terms..." autocomplete="off" />
      <div class="suggestions" id="mob-search-suggestions" aria-live="polite"></div>
    </div>
    <button class="mob-filter-btn" onclick="openDrawer()">
      <i class="ti ti-adjustments-horizontal" aria-hidden="true"></i> Filter
    </button>
  </div>

  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close"><i class="ti ti-x"></i></button>
    <div id="drawer-content"></div>
  </div>

  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-card" id="sidebar-inner"></div>
    </aside>
    <main class="content">
      <div class="content-toolbar">
        <p class="stats-text" id="stats" aria-live="polite"></p>
        <select class="sort-select" id="sort-select" onchange="render()">
          <option value="az">A &rarr; Z</option>
          <option value="za">Z &rarr; A</option>
          <option value="cat">By category</option>
        </select>
      </div>
      <div class="terms-list" id="terms-list" role="list"></div>
    </main>
  </div>

  <footer>TSU JPIA |&nbsp; Illyrthion Federation Year 2026&ndash;2027</footer>

  <script src="./terms-data.js"></script>
  <script src="./terms.js"></script>
  <script>
    let deferredPrompt = null;
    const installButton = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', function (event) {
      event.preventDefault();
      deferredPrompt = event;
      if (installButton) installButton.hidden = false;
    });

    window.addEventListener('appinstalled', function () {
      if (installButton) installButton.hidden = true;
      deferredPrompt = null;
    });

    if (installButton) {
      // Show install button on desktop so users can trigger install or get instructions
      if (window.innerWidth > 700) installButton.hidden = false;

      installButton.addEventListener('click', async function () {
        if (deferredPrompt) {
          installButton.disabled = true;
          deferredPrompt.prompt();
          const choice = await deferredPrompt.userChoice;
          if (choice.outcome === 'accepted') {
            console.log('PWA installed');
          }
          deferredPrompt = null;
          installButton.hidden = true;
        } else {
          // Fallback: show manual install instructions for desktop browsers
          var hint = document.getElementById('install-hint');
          var hintText = document.getElementById('install-hint-text');
          if (hint && hintText) {
            // Detect some common browsers for slightly tailored text
            var ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('chrome') >= 0 || ua.indexOf('edg') >= 0) {
              hintText.textContent = 'Open your browser menu (⋯) and choose "Install CPALexicon" or "Install app".';
            } else if (ua.indexOf('firefox') >= 0) {
              hintText.textContent = 'Firefox does not support automatic install prompts on desktop; use "Install" from the browser menu or pin the site to your OS.';
            } else {
              hintText.textContent = 'Use your browser menu and choose "Install" or "Add to desktop" to install this app.';
            }
            hint.hidden = false;
          }
        }
      });
    }

    function closeInstallHint(){
      var hint = document.getElementById('install-hint'); if(hint) hint.hidden = true;
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
